<section
  id="hero"
  class="hero-section"
>
  <!-- Fondo: grilla + blobs -->
  <div class="hero-bg" aria-hidden="true">
    <div class="grid-overlay"></div>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="hero-content">

    <!-- Badge disponibilidad -->
    <div class="available-badge">
      <span class="available-dot"></span>
      Disponible para nuevas oportunidades
    </div>

    <!-- Nombre con gradiente -->
    <h1 class="hero-title">
      {{ personal.name }}
    </h1>

    <!-- Typewriter -->
    <div class="typewriter-wrap">
      <span class="typewriter-text">{{ typewriterText() }}</span><span class="cursor">|</span>
    </div>

    <!-- Chips de contacto -->
    <div class="contact-row">
      <a [href]="'mailto:' + personal.email" class="chip">
        <i class="pi pi-envelope"></i>
        <span>{{ personal.email }}</span>
      </a>
      <a [href]="personal.linkedin" target="_blank" rel="noopener" class="chip">
        <i class="pi pi-linkedin"></i>
        <span>LinkedIn</span>
      </a>
      <a [href]="'tel:' + personal.phone" class="chip">
        <i class="pi pi-phone"></i>
        <span>{{ personal.phone }}</span>
      </a>
      <span class="chip">
        <i class="pi pi-map-marker"></i>
        <span>{{ personal.location }}</span>
      </span>
    </div>

  </div>

  <!-- Scroll indicator -->
  <button class="scroll-btn" (click)="scrollTo('about')" aria-label="Bajar">
    <i class="pi pi-angle-down"></i>
  </button>
</section>
