<section
  id="hero"
  class="hero-section"
>
  <!-- Fondo: grilla + blobs + tech icons -->
  <div class="hero-bg" aria-hidden="true">
    <div class="grid-overlay"></div>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>

    <!-- Floating tech icons (Devicons CDN) -->
    <div class="tech-float tf-1">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/angular/angular-original.svg" alt="Angular" />
    </div>
    <div class="tech-float tf-2">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/react/react-original.svg" alt="React" />
    </div>
    <div class="tech-float tf-3">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/typescript/typescript-original.svg" alt="TypeScript" />
    </div>
    <div class="tech-float tf-4">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/spring/spring-original.svg" alt="Spring Boot" />
    </div>
    <div class="tech-float tf-5">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/javascript/javascript-original.svg" alt="JavaScript" />
    </div>
    <div class="tech-float tf-6">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/postgresql/postgresql-original.svg" alt="PostgreSQL" />
    </div>
    <div class="tech-float tf-7">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/git/git-original.svg" alt="Git" />
    </div>
    <div class="tech-float tf-8">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/docker/docker-original.svg" alt="Docker" />
    </div>
    <div class="tech-float tf-9">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/mysql/mysql-original.svg" alt="MySQL" />
    </div>
    <div class="tech-float tf-10">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/laravel/laravel-original.svg" alt="Laravel" />
    </div>
    <div class="tech-float tf-11">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/php/php-original.svg" alt="PHP" />
    </div>
    <div class="tech-float tf-12">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/cypressio/cypressio-original.svg" alt="Cypress" />
    </div>
  </div>

  <div class="hero-content">

    <!-- Badge disponibilidad -->
    <div class="available-badge">
      <span class="available-dot"></span>
      Disponible para nuevas oportunidades
    </div>

    <!-- Nombre con gradiente -->
    <h1 class="hero-title">
      {{ personal.name }}
    </h1>

    <!-- Typewriter -->
    <div class="typewriter-wrap">
      <span class="typewriter-text">{{ typewriterText() }}</span><span class="cursor">|</span>
    </div>

    <!-- Chips de contacto -->
    <div class="contact-row">
      <a [href]="'mailto:' + personal.email" class="chip">
        <i class="pi pi-envelope"></i>
        <span>{{ personal.email }}</span>
      </a>
      <a [href]="personal.linkedin" target="_blank" rel="noopener" class="chip">
        <i class="pi pi-linkedin"></i>
        <span>LinkedIn</span>
      </a>
      <a [href]="'tel:' + personal.phone" class="chip">
        <i class="pi pi-phone"></i>
        <span>{{ personal.phone }}</span>
      </a>
      <span class="chip">
        <i class="pi pi-map-marker"></i>
        <span>{{ personal.location }}</span>
      </span>
    </div>

  </div>

  <!-- Scroll indicator -->
  <button class="scroll-btn" (click)="scrollTo('about')" aria-label="Bajar">
    <i class="pi pi-angle-down"></i>
  </button>
</section>
