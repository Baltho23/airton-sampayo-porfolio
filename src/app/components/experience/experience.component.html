<section id="experience" class="exp-section">
  <div class="section-container">

    <div class="section-header">
      <p class="section-eyebrow">Trayectoria</p>
      <h2 class="section-title">Experiencia</h2>
    </div>

    <div class="timeline">
      @for (item of experience; track item.company; let i = $index) {
        <div class="timeline-item">

          <!-- Línea + nodo -->
          <div class="timeline-spine">
            <div class="node" [class]="'node-' + i">
              <span>{{ item.company[0] }}</span>
            </div>
            @if (!$last) {
              <div class="spine-line"></div>
            }
          </div>

          <!-- Card -->
          <div class="exp-card" [class]="'card-' + i">
            <div class="card-top">
              <div>
                <h3 class="role">{{ item.role }}</h3>
                <p class="company">{{ item.company }}</p>
              </div>
              <div class="meta">
                <span class="period">
                  <i class="pi pi-calendar"></i>{{ item.period }}
                </span>
                <span class="location">
                  <i class="pi pi-map-marker"></i>{{ item.location }}
                </span>
              </div>
            </div>

            <ul class="bullets">
              @for (bullet of item.bullets; track bullet) {
                <li>
                  <span class="bullet-dot"></span>
                  {{ bullet }}
                </li>
              }
            </ul>
          </div>

        </div>
      }
    </div>

  </div>
</section>
