<section id="contact" class="py-20 bg-white">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Encabezado -->
    <div class="text-center mb-12">
      <span class="section-tag">Contacto</span>
      <h2 class="text-3xl sm:text-4xl font-bold text-primary mt-3">Hablemos</h2>
      <div class="section-divider"></div>
      <p class="text-gray-500 mt-4 text-base">
        ¿Tienes un proyecto en mente o quieres conocer más sobre mi trabajo? ¡Escríbeme!
      </p>
    </div>

    <!-- Formulario -->
    @if (!submitted()) {
      <form (ngSubmit)="onSubmit()" class="contact-form">
        <div class="form-group">
          <label for="contact-name" class="form-label">Nombre</label>
          <input
            pInputText
            id="contact-name"
            [(ngModel)]="name"
            name="name"
            placeholder="Tu nombre completo"
            class="w-full"
            required
          />
        </div>

        <div class="form-group">
          <label for="contact-email" class="form-label">Correo electrónico</label>
          <input
            pInputText
            id="contact-email"
            [(ngModel)]="email"
            name="email"
            type="email"
            placeholder="tu@email.com"
            class="w-full"
            required
          />
        </div>

        <div class="form-group">
          <label for="contact-message" class="form-label">Mensaje</label>
          <textarea
            pTextarea
            id="contact-message"
            [(ngModel)]="message"
            name="message"
            placeholder="Cuéntame sobre tu proyecto o consulta..."
            rows="5"
            class="w-full"
            required
          ></textarea>
        </div>

        <p-button
          type="submit"
          label="Enviar mensaje"
          icon="pi pi-send"
          styleClass="submit-btn w-full justify-center"
        />
      </form>
    } @else {
      <div class="success-message">
        <i class="pi pi-check-circle text-5xl text-accent mb-4"></i>
        <h3 class="text-xl font-bold text-primary">¡Mensaje enviado!</h3>
        <p class="text-gray-500 mt-2">Gracias por escribirme. Te responderé pronto.</p>
      </div>
    }

    <!-- Links de contacto directo -->
    <div class="flex flex-wrap justify-center gap-4 mt-10">
      <a [href]="'mailto:' + personal.email" class="direct-link">
        <i class="pi pi-envelope"></i>
        {{ personal.email }}
      </a>
      <a [href]="personal.linkedin" target="_blank" rel="noopener" class="direct-link">
        <i class="pi pi-linkedin"></i>
        LinkedIn
      </a>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-primary py-6 text-center">
  <p class="text-white/60 text-sm">
    © 2025 Airton Jairo Sampayo Solano — Bogotá, Colombia
  </p>
</footer>
