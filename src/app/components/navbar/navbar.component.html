<header class="navbar-header" [class.elevated]="scrolled()">
  <div class="navbar-container">

    <!-- Marca -->
    <button class="brand" (click)="scrollTo('hero')">
      <span class="brand-dot">AJS</span>
      <span class="brand-text">Airton Sampayo</span>
    </button>

    <!-- Links desktop -->
    <nav class="desktop-nav">
      @for (link of links; track link.anchor) {
        <button
          class="nav-item"
          [class.nav-item--active]="activeSection() === link.anchor"
          (click)="scrollTo(link.anchor)"
        >
          {{ link.label }}
          @if (activeSection() === link.anchor) {
            <span class="nav-indicator"></span>
          }
        </button>
      }
    </nav>

    <!-- Botón CV desktop -->
    <a href="assets/cv.pdf" download="CV-Airton-Sampayo.pdf" class="cv-link desktop-only">
      <i class="pi pi-download"></i>
      Descargar CV
    </a>

    <!-- Hamburguesa -->
    <button class="hamburger mobile-only" (click)="toggleMenu()" aria-label="Menú">
      <span class="bar" [class.bar--open-1]="menuOpen()"></span>
      <span class="bar" [class.bar--open-2]="menuOpen()"></span>
      <span class="bar" [class.bar--open-3]="menuOpen()"></span>
    </button>

  </div>

  <!-- Menú móvil -->
  <div class="mobile-menu" [class.mobile-menu--open]="menuOpen()">
    @for (link of links; track link.anchor) {
      <button
        class="mobile-item"
        [class.mobile-item--active]="activeSection() === link.anchor"
        (click)="scrollTo(link.anchor)"
      >
        {{ link.label }}
      </button>
    }
    <a href="assets/cv.pdf" download class="cv-link mobile-cv">
      <i class="pi pi-download"></i>
      Descargar CV
    </a>
  </div>
</header>
