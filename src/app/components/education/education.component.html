<section id="education" class="edu-section">
  <div class="section-container">

    <div class="section-header">
      <p class="section-eyebrow">Formación</p>
      <h2 class="section-title">Estudios</h2>
    </div>

    <div class="edu-grid">

      <!-- Universidad -->
      <div class="uni-card">
        <div class="uni-icon">
          <i class="pi pi-graduation-cap"></i>
        </div>
        <div>
          <p class="uni-tag">Título universitario</p>
          <h3 class="uni-degree">{{ education.degree }}</h3>
          <p class="uni-inst">{{ education.institution }}</p>
          <span class="uni-period">
            <i class="pi pi-calendar"></i> {{ education.period }}
          </span>
        </div>
      </div>

      <!-- Certificaciones -->
      <div class="certs-col">
        <p class="certs-heading">Certificaciones</p>
        @for (cert of certifications; track cert.name) {
          <div class="cert-card">
            <div class="cert-badge">
              <i class="pi pi-verified"></i>
            </div>
            <div class="cert-info">
              <p class="cert-name">{{ cert.name }}</p>
              <span class="cert-meta">{{ cert.platform }} · {{ cert.date }}</span>
            </div>
          </div>
        }
      </div>

    </div>
  </div>
</section>
