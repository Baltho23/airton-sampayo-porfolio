<section id="education" class="py-20 bg-white">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-14">
      <span class="section-tag">Formación</span>
      <h2 class="text-3xl sm:text-4xl font-bold text-primary mt-3">Educación</h2>
      <div class="section-divider"></div>
    </div>

    <!-- Título universitario -->
    <div class="edu-card mb-10">
      <div class="edu-icon-wrap">
        <i class="pi pi-graduation-cap"></i>
      </div>
      <div class="flex-1">
        <h3 class="text-xl font-bold text-white">{{ education.degree }}</h3>
        <p class="font-semibold mt-1" style="color: #EADFF0;">{{ education.institution }}</p>
        <span class="inline-flex items-center gap-1 text-sm mt-2" style="color: rgba(255,255,255,0.55);">
          <i class="pi pi-calendar text-xs"></i>
          {{ education.period }}
        </span>
      </div>
    </div>

    <!-- Certificaciones -->
    <h3 class="text-xl font-semibold text-primary mb-5 flex items-center gap-2">
      <i class="pi pi-verified text-accent"></i>
      Certificaciones
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      @for (cert of certifications; track cert.name) {
        <div class="cert-card">
          <div class="flex items-start gap-3">
            <div class="cert-icon">
              <i class="pi pi-shield"></i>
            </div>
            <div>
              <p class="font-semibold text-primary text-sm">{{ cert.name }}</p>
              <div class="flex items-center gap-2 mt-1">
                <p-tag [value]="cert.platform" severity="info" />
                <span class="text-gray-400 text-xs">{{ cert.date }}</span>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
