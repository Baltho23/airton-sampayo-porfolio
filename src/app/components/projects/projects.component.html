<section id="projects" class="projects-section">
  <div class="section-container">

    <div class="section-header">
      <p class="section-eyebrow">Portafolio</p>
      <h2 class="section-title">Proyectos</h2>
    </div>

    <div class="projects-grid">
      @for (project of projects; track project.name; let i = $index) {
        <a [href]="project.githubUrl" target="_blank" rel="noopener noreferrer" class="project-card">

          <!-- Número decorativo -->
          <span class="project-number">0{{ i + 1 }}</span>

          <!-- Icono -->
          <div class="project-icon-wrap">
            <i class="pi pi-code"></i>
          </div>

          <h3 class="project-name">{{ project.name }}</h3>
          <p class="project-desc">{{ project.description }}</p>

          <!-- Stack -->
          <div class="stack-wrap">
            @for (tech of project.stack; track tech) {
              <span class="tech-tag">{{ tech }}</span>
            }
          </div>

          <!-- CTA -->
          <div class="project-cta">
            <span>Ver en GitHub</span>
            <i class="pi pi-arrow-right"></i>
          </div>

        </a>
      }
    </div>

  </div>
</section>
